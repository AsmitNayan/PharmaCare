<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PharmaCare — View and manage all medicines in inventory">
    <title>PharmaCare — Medicines</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="app-layout">
        <!-- ========== SIDEBAR ========== -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">💊</div>
                <div>
                    <h2>PharmaCare</h2>
                    <span>Management System</span>
                </div>
            </div>

            <nav>
                <a href="/dashboard">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/medicines-page" class="active">
                    <span class="nav-icon">💊</span>
                    <span>Medicines</span>
                </a>
                <a href="/add-page">
                    <span class="nav-icon">➕</span>
                    <span>Add Medicine</span>
                </a>
                <a href="/billing-page">
                    <span class="nav-icon">🧾</span>
                    <span>Billing</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" onclick="logout(); return false;">
                    <span class="nav-icon">🚪</span>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- ========== MAIN CONTENT ========== -->
        <main class="main-content">
            <!-- Page Header -->
            <div class="page-header">
                <div>
                    <h1>Medicines</h1>
                    <p>Manage your pharmacy inventory</p>
                </div>
                <div class="search-bar">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchMedicine" placeholder="Search medicines...">
                </div>
            </div>

            <!-- Medicines Table -->
            <div class="table-container">
                <div class="table-header">
                    <h2>💊 All Medicines</h2>
                    <a href="/add-page" class="btn btn-primary btn-sm">➕ Add New</a>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Expiry Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="medicinesBody">
                        <tr><td colspan="7"><div class="loading-spinner"></div></td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- ========== EDIT MODAL ========== -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2>✏️ Edit Medicine</h2>
            <input type="hidden" id="editId">

            <div class="form-group">
                <label for="editName">Medicine Name</label>
                <input type="text" id="editName" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="editPrice">Price (₹)</label>
                    <input type="number" id="editPrice" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label for="editQuantity">Quantity</label>
                    <input type="number" id="editQuantity" min="0" required>
                </div>
            </div>

            <div class="form-group">
                <label for="editExpiry">Expiry Date</label>
                <input type="date" id="editExpiry" required>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary" onclick="submitEdit()">Save Changes</button>
                <button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>

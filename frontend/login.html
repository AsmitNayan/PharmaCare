<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pharmacy Management System — Admin Login">
    <title>PharmaCare — Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo">
                <div class="icon">💊</div>
                <h1>PharmaCare</h1>
                <p>Pharmacy Management System</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    Sign In
                </button>
            </form>

            <p style="text-align:center; margin-top:20px; font-size:0.75rem; color:var(--text-muted);">
                Default credentials: <strong>admin</strong> / <strong>admin123</strong>
            </p>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
